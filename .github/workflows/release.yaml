name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        image:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-26
    runs-on: ${{ matrix.image }}
    steps:
      - id: init
        name: Initialize
        uses: spotdemo4/nix-init@369737c1af5db893f0dc4108a99ebb50133340e8 # v1.38.0
        with:
          app_id: ${{ vars.CLIENT_ID }}
          app_key: ${{ secrets.PRIVATE_KEY }}
          fetch_depth: 0
          shell: release

      - name: Publish to GitHub
        run: flake-release
        env:
          GITHUB_TOKEN: ${{ steps.init.outputs.token }}
          REGISTRY: ghcr.io
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE: appimage

      - name: Publish to GitHub (script)
        if: matrix.image == 'ubuntu-24.04'
        env:
          GH_TOKEN: ${{ steps.init.outputs.token }}
        run: |
          # Publishing bash script

          echo "Inlining sources"
          ./.github/inline.sh ./src/bumper.sh > bumper.sh

          echo "Uploading to GitHub"
          gh release upload "$(git describe --tags --abbrev=0)" bumper.sh
